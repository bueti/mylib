apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mylib.fullname" . }}
  labels:
    {{- include "mylib.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "mylib.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "mylib.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "mylib.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: MYLIB_LIBRARY_ROOTS
              value: {{ .Values.config.libraryRoots | quote }}
            - name: MYLIB_DATA_DIR
              value: {{ .Values.config.dataDir | quote }}
            - name: MYLIB_LISTEN
              value: {{ .Values.config.listen | quote }}
            - name: MYLIB_SCAN_INTERVAL
              value: {{ .Values.config.scanInterval | quote }}
            - name: MYLIB_LOG_LEVEL
              value: {{ .Values.config.logLevel | quote }}
            - name: MYLIB_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "mylib.adminSecretName" . }}
                  key: username
            - name: MYLIB_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "mylib.adminSecretName" . }}
                  key: password
          livenessProbe:
            httpGet:
              path: /api/openapi.json
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/openapi.json
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /data
            - name: books
              mountPath: /books
            - name: tmp
              mountPath: /tmp
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: data
          {{- if .Values.persistence.data.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.data.existingClaim | default (printf "%s-data" (include "mylib.fullname" .)) }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: books
          {{- if .Values.persistence.books.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.books.existingClaim | default (printf "%s-books" (include "mylib.fullname" .)) }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
