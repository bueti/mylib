{{- if not .Values.admin.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mylib.fullname" . }}-admin
  labels:
    {{- include "mylib.labels" . | nindent 4 }}
type: Opaque
data:
  username: {{ .Values.admin.username | b64enc | quote }}
  password: {{ .Values.admin.password | b64enc | quote }}
{{- end }}
